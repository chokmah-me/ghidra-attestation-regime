[env:black_f407vg]
platform = ststm32
board = black_f407vg
framework = stm32cube
build_flags =
    -DSTM32F407xx
    -D__weak=__attribute__((weak))
    -D__packed=__attribute__((__packed__))

src_filter = +<src/*> -<.git/> -<.pio/> -<test/>

# Link STM32CubeF4 example sources
build_src_filter =
    +<*>
    +<../../../../Tools/STM32CubeF4/Projects/STM32F4-Discovery/Examples/ADC/ADC_RegularConversion_DMA/Src/*>
    +<../../../../Tools/STM32CubeF4/Projects/STM32F4-Discovery/Examples/ADC/ADC_RegularConversion_DMA/Inc/*>

extra_dirs =
    C:/Tools/STM32CubeF4/Drivers/CMSIS/Device/ST/STM32F4xx/Include
    C:/Tools/STM32CubeF4/Drivers/CMSIS/Core/Include
    C:/Tools/STM32CubeF4/Drivers/STM32F4xx_HAL_Driver/Inc
    C:/Tools/STM32CubeF4/Projects/STM32F4-Discovery/Examples/ADC/ADC_RegularConversion_DMA/Inc

build_unflags = -Wall

monitor_speed = 115200
